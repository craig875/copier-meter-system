# One-time: add GitHub repo secrets (Settings → Secrets → Actions):
#   DEPLOY_HOST     — server hostname or IP
#   DEPLOY_USER     — SSH user (e.g. root or deploy)
#   DEPLOY_SSH_KEY  — private key (full PEM including BEGIN/END lines)
# Optional:
#   DEPLOY_SSH_PORT — default 22

name: Deploy to server

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            # Repo path — change here if your clone lives elsewhere, or set DEPLOY_PATH in repo secrets
            REPO="${DEPLOY_PATH:-/var/www/copier-meter-system}"
            cd "$REPO"
            # Ensure latest code (including scripts/deploy.sh) exists before first deploy.sh run
            git fetch origin
            git checkout main 2>/dev/null || git checkout -b main origin/main
            git reset --hard origin/main
            chmod +x scripts/deploy.sh
            ./scripts/deploy.sh
