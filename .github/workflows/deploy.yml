# One-time: add GitHub repo secrets (Settings → Secrets → Actions):
#   DEPLOY_HOST     — server hostname or IP
#   DEPLOY_USER     — SSH user (e.g. root or deploy)
#   DEPLOY_SSH_KEY  — private key (full PEM including BEGIN/END lines)
# Optional:
#   DEPLOY_SSH_PORT — default 22
#   DEPLOY_PATH   — server path to repo (default /var/www/copier-meter-system)

name: Deploy to server

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      # Passed to SSH session when listed in envs below (optional secret).
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
    steps:
      - name: Check deploy secrets are set
        run: |
          e=0
          if [ -z "$DEPLOY_HOST" ]; then echo "::error::Repository secret DEPLOY_HOST is missing or empty"; e=1; fi
          if [ -z "$DEPLOY_USER" ]; then echo "::error::Repository secret DEPLOY_USER is missing or empty"; e=1; fi
          if [ -z "$DEPLOY_SSH_KEY" ]; then echo "::error::Repository secret DEPLOY_SSH_KEY is missing or empty"; e=1; fi
          exit "$e"
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: DEPLOY_PATH
          command_timeout: 30m
          # Set true temporarily if the job fails and you need more SSH detail in the log.
          debug: false
          script_stop: true
          script: |
            set -e
            REPO="${DEPLOY_PATH:-/var/www/copier-meter-system}"
            echo "==> Deploy: REPO=$REPO"
            cd "$REPO"
            # Ensure latest code (including scripts/deploy.sh) exists before first deploy.sh run
            git fetch origin
            git checkout main 2>/dev/null || git checkout -b main origin/main
            git reset --hard origin/main
            chmod +x scripts/deploy.sh
            ./scripts/deploy.sh
